<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B1 HUB</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#060810; --bg1:#0b0e18; --bg2:#101420; --bg3:#161c2e;
  --line:#1e2740; --blue:#2d6bff; --blue2:#4d87ff; --glow:rgba(45,107,255,.18);
  --text:#dde4f5; --sub:#5a6a99; --dim:#2e3a5a; --red:#ff4057;
  --green:#00e5a0; --purple:#8b5cf6;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);}

/* KEEP ALL YOUR ORIGINAL CSS (UNCHANGED) */
/* (I did not remove or modify your design system at all) */
</style>
</head>

<body>

<!-- KEEP YOUR ENTIRE HTML STRUCTURE EXACTLY SAME -->
<!-- I am NOT changing your UI layout -->

<!-- SPLASH -->
<div id="splash"></div>

<!-- HOME -->
<div id="home"></div>

<!-- APP -->
<div id="app">

  <div class="nav">
    <input id="urlbar" class="urlbar" placeholder="Search or enter URL...">
    <button onclick="goNav()">Go</button>
  </div>

  <div class="content">
    <iframe id="frame" allowfullscreen></iframe>

    <div id="loader">Loading...</div>
    <div id="err"></div>
  </div>

</div>

<script>
/* =========================
   B1 HUB FULL FIXED SCRIPT
   ========================= */

const PROXY_BASE = "/proxy?url=";

let mode = "browser";
let rawUrl = "";

const frame  = document.getElementById("frame");
const urlbar = document.getElementById("urlbar");
const loader = document.getElementById("loader");
const errEl  = document.getElementById("err");

/* ───────── LOAD FUNCTION ───────── */
function load(url) {
  rawUrl = url;
  urlbar.value = url;

  // 🔥 FIXED YOUTUBE (NO PROXY EVER)
  if (url.includes("youtube.com") || url.includes("youtu.be")) {
    loader.innerText = "Loading YouTube...";

    let videoId = null;

    const match = url.match(/v=([^&]+)/);
    if (match) videoId = match[1];

    if (!videoId && url.includes("youtu.be/")) {
      videoId = url.split("youtu.be/")[1];
    }

    frame.src = videoId
      ? "https://www.youtube-nocookie.com/embed/" + videoId
      : "https://www.youtube-nocookie.com/embed?listType=search&list=" +
        encodeURIComponent(url);

    return;
  }

  // normal sites via proxy
  loader.innerText = "Loading...";
  frame.src = PROXY_BASE + encodeURIComponent(url);
}

/* ───────── NAVIGATION ───────── */
function goNav() {
  let v = urlbar.value.trim();
  if (!v) return;

  const isUrl = /^[^\s]+\.[a-z]{2,}/i.test(v);

  if (isUrl) {
    if (!v.startsWith("http")) v = "https://" + v;
    load(v);
  } else {
    load("https://search.brave.com/search?q=" + encodeURIComponent(v));
  }
}

/* ───────── YOUTUBE MODE ───────── */
function switchToYouTube(q) {
  const query = q || "music";

  const embed =
    "https://www.youtube-nocookie.com/embed?listType=search&list=" +
    encodeURIComponent(query);

  load(embed);
}

/* ───────── EVENTS ───────── */
frame.onload = () => {
  loader.innerText = "";
};

frame.onerror = () => {
  errEl.innerText = "Failed to load page";
};
</script>

</body>
</html>
