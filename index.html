<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B1 HUB</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060810; --bg1:#0b0e18; --bg2:#101420; --bg3:#161c2e;
  --line:#1e2740; --blue:#2d6bff; --blue2:#4d87ff; --glow:rgba(45,107,255,.18);
  --text:#dde4f5; --sub:#5a6a99; --dim:#2e3a5a; --red:#ff4057;
  --green:#00e5a0; --purple:#8b5cf6; --orange:#f97316; --radius:14px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;color:var(--text);background:var(--bg);}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity .6s ease,transform .6s ease;
}
#splash.out{opacity:0;transform:scale(1.04);pointer-events:none;}
.splash-ring{
  width:110px;height:110px;border-radius:50%;border:1.5px solid var(--line);
  display:grid;place-items:center;position:relative;
  animation:ringPulse 2s ease-in-out infinite;
}
.splash-ring::before{
  content:'';position:absolute;inset:-1px;border-radius:50%;
  border:1.5px solid transparent;border-top-color:var(--blue);
  animation:spin 1.1s linear infinite;
}
.splash-b1{
  font-size:2.2rem;font-weight:900;letter-spacing:-.04em;
  background:linear-gradient(135deg,#fff 40%,var(--blue2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.splash-label{
  margin-top:26px;font-family:'DM Mono',monospace;font-size:.62rem;
  color:var(--sub);letter-spacing:.3em;text-transform:uppercase;
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 var(--glow);}50%{box-shadow:0 0 40px 8px var(--glow);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes neonShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* ── HOME ── */
#home{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;transition:opacity .5s ease;overflow:hidden;
}
#home.in{opacity:1;}
#home.out{opacity:0;pointer-events:none;transition:opacity .3s;}
.mesh{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 20% 30%,rgba(45,107,255,.06) 0%,transparent 60%),
             radial-gradient(ellipse 50% 60% at 80% 70%,rgba(139,92,246,.05) 0%,transparent 60%);
}
.grid-bg{
  position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),
                   linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:56px 56px;opacity:.16;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);
}
.home-inner{position:relative;z-index:1;text-align:center;padding:0 20px;}
.wordmark{
  font-size:clamp(3rem,9vw,6rem);font-weight:900;letter-spacing:-.05em;line-height:1;
  background:linear-gradient(150deg,#fff 20%,var(--blue2) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:slideUp .6s .1s both;
}
.tagline{
  font-family:'DM Mono',monospace;font-size:.68rem;color:var(--sub);
  letter-spacing:.22em;text-transform:uppercase;margin:10px 0 44px;
  animation:slideUp .6s .2s both;
}
.section-label{
  font-family:'DM Mono',monospace;font-size:.6rem;color:var(--dim);
  letter-spacing:.2em;text-transform:uppercase;
  margin-bottom:12px;text-align:left;width:100%;
}

/* App cards */
.cards-wrap{animation:slideUp .6s .3s both;width:100%;max-width:580px;}
.cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.card{
  position:relative;overflow:hidden;width:148px;padding:20px 16px 18px;
  background:var(--bg1);border:1px solid var(--line);border-radius:18px;
  cursor:pointer;text-align:left;
  transition:transform .2s,border-color .2s,box-shadow .2s;
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,.025),transparent);pointer-events:none;
}
.card:hover{transform:translateY(-5px);border-color:var(--blue);box-shadow:0 10px 36px var(--glow);}
.card:active{transform:translateY(-2px) scale(.98);}
.card-icon{
  width:38px;height:38px;border-radius:10px;display:grid;
  place-items:center;font-size:1rem;margin-bottom:12px;
}
.ci-br{background:linear-gradient(135deg,#0d2a60,#1a4cb0);}
.ci-yt{background:linear-gradient(135deg,#4a0a0a,#b01a1a);}
.card-name{font-size:.9rem;font-weight:700;}
.card-desc{font-size:.65rem;color:var(--sub);margin-top:3px;font-family:'DM Mono',monospace;}

/* Games row */
.games-wrap{animation:slideUp .6s .4s both;width:100%;max-width:580px;margin-top:28px;}
.games{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.game-chip{
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  background:var(--bg1);border:1px solid var(--line);border-radius:30px;
  cursor:pointer;font-size:.82rem;font-weight:600;color:var(--text);
  transition:background .2s,border-color .2s,transform .15s;
}
.game-chip:hover{background:var(--bg2);border-color:var(--green);transform:translateY(-2px);}
.game-chip:active{transform:scale(.97);}
.game-chip span{font-size:.9rem;}
.ver{
  position:absolute;bottom:22px;font-family:'DM Mono',monospace;
  font-size:.58rem;color:var(--dim);letter-spacing:.15em;
  animation:slideUp .6s .5s both;
}

/* NAV */
.nav{height:50px;display:flex;align-items:center;gap:8px;padding:0 10px;}
.urlbar{flex:1;padding:8px;border-radius:8px;border:1px solid var(--line);}
.content{height:calc(100% - 50px);}
#frame{width:100%;height:100%;border:none;}
</style>
</head>

<body>

<div id="splash"></div>
<div id="home"></div>

<div id="app">
  <div class="nav">
    <button onclick="goNav()">Go</button>
    <input id="urlbar" class="urlbar" placeholder="Search or enter URL...">
  </div>

  <div class="content">
    <iframe id="frame" allowfullscreen></iframe>
    <div id="loader">Loading...</div>
    <div id="err"></div>
  </div>
</div>

<script>

const PROXY_BASE = "/proxy?url=";

const frame  = document.getElementById("frame");
const urlbar = document.getElementById("urlbar");
const loader = document.getElementById("loader");
const errEl  = document.getElementById("err");

function load(url) {
  urlbar.value = url;

  if (url.includes("youtube.com") || url.includes("youtu.be")) {
    loader.innerText = "Loading YouTube...";

    let videoId = null;

    const match = url.match(/v=([^&]+)/);
    if (match) videoId = match[1];

    if (!videoId && url.includes("youtu.be/")) {
      videoId = url.split("youtu.be/")[1];
    }

    frame.src = videoId
      ? "https://www.youtube-nocookie.com/embed/" + videoId
      : "https://www.youtube-nocookie.com/embed?listType=search&list=" +
        encodeURIComponent(url);

    return;
  }

  loader.innerText = "Loading...";
  frame.src = PROXY_BASE + encodeURIComponent(url);
}

function goNav() {
  let v = urlbar.value.trim();
  if (!v) return;

  const isUrl = /^[^\s]+\.[a-z]{2,}/i.test(v);

  if (isUrl) {
    if (!v.startsWith("http")) v = "https://" + v;
    load(v);
  } else {
    load("https://search.brave.com/search?q=" + encodeURIComponent(v));
  }
}

frame.onload = () => {
  loader.innerText = "";
};

frame.onerror = () => {
  errEl.innerText = "Failed to load page";
};

</script>

</body>
</html>
