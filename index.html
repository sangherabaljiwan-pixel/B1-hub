<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B1 HUB</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
/* (UNCHANGED — your entire CSS stays exactly the same) */
</style>
</head>

<body>

<canvas id="starfield"></canvas>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-ring"><span class="splash-b1">B1</span></div>
  <p class="splash-label">Initializing hub…</p>
</div>

<!-- HOME -->
<div id="home">
  <div class="nebula"></div>
  <div class="home-inner">
    <h1 class="wordmark">B1 HUB</h1>
    <p class="tagline">Your immersive galaxy experience</p>

    <div class="cards-wrap">
      <p class="section-label">// apps</p>
      <div class="cards">
        <div class="card" onclick="openApp('browser')">
          <div class="card-icon ci-br">🦁</div>
          <div class="card-name">Brave</div>
          <div class="card-desc">Search anything</div>
        </div>

        <div class="card" onclick="openApp('youtube')">
          <div class="card-icon ci-yt">▶</div>
          <div class="card-name">YouTube</div>
          <div class="card-desc">Watch videos</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="nav">
    <button onclick="goHome()">⌂</button>
    <input id="urlbar" placeholder="Search or URL..." />
    <button onclick="goNav()">→</button>
  </div>

  <div class="content">
    <iframe id="frame"></iframe>
  </div>
</div>

<script>
/* =========================================================
   🔥 FIX #1 — AUTO PROXY BASE (IMPORTANT FOR RENDER)
========================================================= */

// 🔧 This is the BIG fix for "refused to connect"
const PROXY_BASE =
  window.location.hostname === "localhost"
    ? "http://localhost:3000/proxy?url="
    : window.location.origin + "/proxy?url=";

const PUBLIC_PROXIES = [
  u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`
];

let frame = document.getElementById("frame");
let urlbar = document.getElementById("urlbar");

let rawUrl = "";
let proxyIndex = 0;

/* =========================================================
   🔥 FIX #2 — SAFE LOAD FUNCTION (PREVENT FAIL LOOP)
========================================================= */

function load(url) {
  rawUrl = url;
  proxyIndex = 0;
  tryLoad();
}

function tryLoad() {
  if (!rawUrl) return;

  // 🔹 FIRST TRY YOUR OWN SERVER
  if (proxyIndex === 0) {
    frame.src = PROXY_BASE + encodeURIComponent(rawUrl);
    proxyIndex++;
    return;
  }

  // 🔹 FALLBACK PROXIES
  if (proxyIndex <= PUBLIC_PROXIES.length) {
    frame.src = PUBLIC_PROXIES[proxyIndex - 1](rawUrl);
    proxyIndex++;
    return;
  }

  alert("All proxy routes failed.");
}

/* =========================================================
   🔥 NAVIGATION
========================================================= */

function goNav() {
  let v = urlbar.value.trim();
  if (!v) return;

  if (!v.startsWith("http")) {
    v = "https://" + v;
  }

  load(v);
}

function goHome() {
  frame.src = "about:blank";
}

/* =========================================================
   🔥 APPS
========================================================= */

function openApp(type) {
  if (type === "youtube") {
    load("https://www.youtube.com");
  } else {
    alert("Browser opened — use URL bar");
  }
}

/* =========================================================
   🔥 FIX #3 — iframe LOAD SAFETY
========================================================= */

frame.onload = () => {
  console.log("Loaded:", frame.src);
};

frame.onerror = () => {
  tryLoad();
};

</script>

</body>
</html>
